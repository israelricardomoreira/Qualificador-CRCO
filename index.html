<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizador GED — CRCO</title>
<style>:root{--bg:#0c0c10;--s1:#13131a;--s2:#1a1a24;--s3:#22222f;--border:#2c2c3e;--border2:#3a3a50;--accent:#5b8dee;--green:#42d392;--red:#f87171;--purple:#a78bfa;--text:#e2e2ee;--muted:#6b6b85;--mono:Consolas,monospace;--sans:"Segoe UI",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.htitle{font-size:14px;font-weight:600}.hsub{font-size:11px;color:var(--muted);font-family:var(--mono)}.hactions{margin-left:auto}
.app-body{flex:1;display:flex;overflow:hidden}
.panel-left{width:340px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--s1);position:relative}
.panel-right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.phead{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.phead h3{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.pcount{font-family:var(--mono);font-size:11px;color:var(--accent);margin-left:auto}
.toolbar{padding:8px 12px;display:flex;gap:6px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;align-items:center}
.pages-grid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;align-content:start}
.pages-grid::-webkit-scrollbar{width:4px}.pages-grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.page-card{position:relative;border-radius:6px;overflow:hidden;border:2px solid var(--border);cursor:pointer;aspect-ratio:.707;background:var(--s2);user-select:none;transition:border-color .15s}
.page-card:hover{border-color:var(--border2)}.page-card.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}.page-card.grouped{border-color:var(--green);opacity:.45;cursor:default}
.page-card img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.page-num{position:absolute;top:3px;left:3px;background:rgba(12,12,16,.82);font-family:var(--mono);font-size:9px;color:var(--muted);padding:1px 4px;border-radius:3px}
.page-check{position:absolute;top:3px;right:3px;width:16px;height:16px;background:var(--accent);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:9px;color:#fff}
.page-card.selected .page-check{display:flex}
.page-fname{position:absolute;bottom:0;left:0;right:0;background:rgba(12,12,16,.75);font-size:8px;font-family:var(--mono);color:var(--muted);padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drop-overlay{position:absolute;inset:0;background:rgba(91,141,238,.08);border:2px dashed var(--accent);display:none;align-items:center;justify-content:center;z-index:50;pointer-events:none;border-radius:4px}
.drop-overlay.active{display:flex}.drop-overlay span{font-size:14px;color:var(--accent);font-weight:600}
.docs-list{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.docs-list::-webkit-scrollbar{width:4px}.docs-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.doc-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.doc-card-top{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--s2);border-bottom:1px solid var(--border)}
.doc-num-badge{width:30px;height:30px;background:var(--s3);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;color:var(--muted);flex-shrink:0}
.doc-title{flex:1;font-size:13px;font-weight:600}.doc-fields{display:grid;grid-template-columns:160px 1fr 150px}
.doc-field{padding:9px 14px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:4px}.doc-field:last-child{border-right:none}
.flabel{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.doc-field select,.doc-field input{background:transparent;border:none;color:var(--text);font-size:12px;font-family:var(--sans);width:100%;outline:none}
.doc-field select{cursor:pointer}.doc-field select option{background:var(--s2)}
.doc-pages-strip{display:flex;gap:6px;padding:8px 14px;background:var(--s2);border-top:1px solid var(--border);overflow-x:auto;align-items:center;min-height:64px}
.doc-pages-strip::-webkit-scrollbar{height:3px}.doc-pages-strip::-webkit-scrollbar-thumb{background:var(--border2)}
.strip-thumb{width:40px;height:50px;border-radius:4px;overflow:hidden;border:1px solid var(--border);flex-shrink:0;cursor:pointer;position:relative}
.strip-thumb:hover::after{content:"x";position:absolute;inset:0;background:rgba(248,113,113,.75);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700}
.strip-thumb img{width:100%;height:100%;object-fit:cover}
.strip-count{font-size:10px;font-family:var(--mono);color:var(--muted);margin-left:auto;flex-shrink:0}
.valid-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}.valid-row input[type=checkbox]{accent-color:var(--accent);cursor:pointer}
.bottom-bar{padding:12px 20px;border-top:1px solid var(--border);background:var(--s1);display:flex;align-items:center;gap:12px;flex-shrink:0}
.stats{font-family:var(--mono);font-size:11px;color:var(--muted)}.stats b{color:var(--text);font-weight:600}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:500;font-family:var(--sans);cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-xs{padding:4px 10px;font-size:11px}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4a7de0}.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-success{background:var(--green);color:#0c0c10;font-weight:700}.btn-success:hover{opacity:.85}.btn-success:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:var(--s3);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--border2)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(248,113,113,.25)}.btn-danger:hover{background:rgba(248,113,113,.08)}
.sel-badge{font-size:11px;color:var(--accent);font-family:var(--mono);padding:3px 8px;background:rgba(91,141,238,.12);border:1px solid rgba(91,141,238,.2);border-radius:5px}
.empty-msg{padding:50px 20px;text-align:center;color:var(--muted)}.empty-msg .ei{font-size:32px;margin-bottom:10px}.empty-msg p{font-size:12px;line-height:1.7}
.progress-overlay{display:none;position:fixed;inset:0;background:rgba(12,12,16,.82);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center}
.progress-overlay.on{display:flex}.progress-box{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:28px 40px;text-align:center;min-width:300px}
.ptitle{font-size:14px;font-weight:600;margin-bottom:6px}.pmsg{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:16px}
.pbar{background:var(--s3);border-radius:6px;height:5px;overflow:hidden}.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:6px;transition:width .3s}
.toast{position:fixed;bottom:20px;right:20px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:12px;display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(8px);transition:all .25s;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}.toast.ok{border-color:var(--green)}.toast.err{border-color:var(--red)}</style>

<body>
<header>
  <div class="logo">📋</div>
  <div><div class="htitle">Organizador GED</div><div class="hsub">CRCO — Cartório de Registros</div></div>
  <div class="hactions">
    <label class="btn btn-ghost btn-xs" style="cursor:pointer">+ Importar arquivos
      <input type="file" accept=".jpg,.jpeg,.png,.tif,.tiff,.pdf" multiple style="display:none" onchange="handleFileInput(this.files);this.value='';">
    </label>
  </div>
</header>
<div class="app-body">
  <div class="panel-left">
    <div class="drop-overlay" id="dropOverlay"><span>📂 Solte aqui</span></div>
    <div class="phead"><h3>Páginas importadas</h3><span class="pcount" id="pageCount">0</span></div>
    <div class="toolbar">
      <button class="btn btn-ghost btn-xs" onclick="selectAll()">Selecionar tudo</button>
      <button class="btn btn-ghost btn-xs" onclick="clearSel()">Limpar</button>
      <span class="sel-badge" id="selBadge" style="display:none">0</span>
    </div>
    <div class="pages-grid" id="pagesGrid">
      <div class="empty-msg" style="grid-column:1/-1"><div class="ei">🖼️</div><p>Arraste as imagens JPG<br>ou PDFs do protocolo aqui</p></div>
    </div>
  </div>
  <div class="panel-right">
    <div class="phead">
      <h3>Documentos organizados</h3><span class="pcount" id="docCount">0</span>
      <button class="btn btn-primary btn-xs" id="groupBtn" onclick="groupSelected()" disabled style="margin-left:8px">⊕ Agrupar selecionadas</button>
    </div>
    <div class="docs-list" id="docsList">
      <div class="empty-msg"><div class="ei">📁</div><p>Selecione páginas à esquerda<br>e clique em <strong>Agrupar</strong></p></div>
    </div>
    <div class="bottom-bar">
      <div class="stats">páginas: <b id="sPgs">0</b> &nbsp;|&nbsp; docs: <b id="sDocs">0</b> &nbsp;|&nbsp; agrupadas: <b id="sGrp">0</b></div>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn btn-ghost btn-xs" onclick="clearAll()">🗑 Limpar tudo</button>
        <button class="btn btn-success" id="dlBtn" onclick="downloadZip()" disabled>⬇ Baixar ZIP</button>
      </div>
    </div>
  </div>
</div>
<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box"><div class="ptitle">Gerando ZIP...</div><div class="pmsg" id="pmsg">Aguarde</div><div class="pbar"><div class="pfill" id="pfill" style="width:0"></div></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
// ── Minimal ZIP builder (sem Workers, funciona em file://) ──
const MiniZip = {
  _crc32Table: null,

  _makeCrcTable() {
    if (this._crc32Table) return;
    this._crc32Table = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
      let c = i;
      for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      this._crc32Table[i] = c;
    }
  },

  crc32(buf) {
    this._makeCrcTable();
    const t = this._crc32Table;
    let crc = 0xFFFFFFFF;
    for (let i = 0; i < buf.length; i++) crc = t[(crc ^ buf[i]) & 0xFF] ^ (crc >>> 8);
    return (crc ^ 0xFFFFFFFF) >>> 0;
  },

  async create(files) {
    // files = [{name, data}] where data is ArrayBuffer
    const enc = new TextEncoder();
    const localHeaders = [];
    const centralDir = [];
    let offset = 0;

    for (const file of files) {
      const nameBytes = enc.encode(file.name);
      const data = new Uint8Array(file.data instanceof ArrayBuffer ? file.data : await file.data);
      const crc = this.crc32(data);
      const now = new Date();
      const dosTime = ((now.getHours() << 11) | (now.getMinutes() << 5) | (now.getSeconds() >> 1)) & 0xFFFF;
      const dosDate = (((now.getFullYear() - 1980) << 9) | ((now.getMonth() + 1) << 5) | now.getDate()) & 0xFFFF;

      // Local file header
      const lh = new Uint8Array(30 + nameBytes.length);
      const lhv = new DataView(lh.buffer);
      lhv.setUint32(0, 0x04034b50, true);  // signature
      lhv.setUint16(4, 20, true);           // version needed
      lhv.setUint16(6, 0, true);            // flags
      lhv.setUint16(8, 0, true);            // compression (stored)
      lhv.setUint16(10, dosTime, true);
      lhv.setUint16(12, dosDate, true);
      lhv.setUint32(14, crc, true);
      lhv.setUint32(18, data.length, true); // compressed size
      lhv.setUint32(22, data.length, true); // uncompressed size
      lhv.setUint16(26, nameBytes.length, true);
      lhv.setUint16(28, 0, true);           // extra field length
      lh.set(nameBytes, 30);

      localHeaders.push({ lh, data, nameBytes, crc, dosTime, dosDate, offset });
      offset += lh.length + data.length;

      // Central directory entry
      const cd = new Uint8Array(46 + nameBytes.length);
      const cdv = new DataView(cd.buffer);
      cdv.setUint32(0, 0x02014b50, true);  // signature
      cdv.setUint16(4, 20, true);           // version made by
      cdv.setUint16(6, 20, true);           // version needed
      cdv.setUint16(8, 0, true);            // flags
      cdv.setUint16(10, 0, true);           // compression
      cdv.setUint16(12, dosTime, true);
      cdv.setUint16(14, dosDate, true);
      cdv.setUint32(16, crc, true);
      cdv.setUint32(20, data.length, true);
      cdv.setUint32(24, data.length, true);
      cdv.setUint16(28, nameBytes.length, true);
      cdv.setUint16(30, 0, true);           // extra
      cdv.setUint16(32, 0, true);           // comment
      cdv.setUint16(34, 0, true);           // disk start
      cdv.setUint16(36, 0, true);           // internal attr
      cdv.setUint32(38, 0, true);           // external attr
      cdv.setUint32(42, localHeaders[localHeaders.length-1].offset, true); // offset
      cd.set(nameBytes, 46);
      centralDir.push(cd);
    }

    const cdOffset = offset;
    const cdSize = centralDir.reduce((s, cd) => s + cd.length, 0);

    // End of central directory
    const eocd = new Uint8Array(22);
    const eocdv = new DataView(eocd.buffer);
    eocdv.setUint32(0, 0x06054b50, true);
    eocdv.setUint16(4, 0, true);
    eocdv.setUint16(6, 0, true);
    eocdv.setUint16(8, files.length, true);
    eocdv.setUint16(10, files.length, true);
    eocdv.setUint32(12, cdSize, true);
    eocdv.setUint32(16, cdOffset, true);
    eocdv.setUint16(20, 0, true);

    // Combine everything
    const total = localHeaders.reduce((s, h) => s + h.lh.length + h.data.length, 0) + cdSize + eocd.length;
    const result = new Uint8Array(total);
    let pos = 0;
    for (const h of localHeaders) {
      result.set(h.lh, pos); pos += h.lh.length;
      result.set(h.data, pos); pos += h.data.length;
    }
    for (const cd of centralDir) { result.set(cd, pos); pos += cd.length; }
    result.set(eocd, pos);
    return result;
  },

  download(bytes, filename) {
    const blob = new Blob([bytes], { type: 'application/zip' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  }
};
</script>
<script>
const CATS = ['ATO_LAVRADO','CERTIDAO','CONTRATO','DECLARACAO','DOCUMENTO_PESSOAL','ESCRITURA','MATRICULA','MEMORIAL','PLANTA_ENGENHARIA','PROCURACAO','PROJETO','OUTROS'];
const STORAGE_KEY = 'ged_desc_history';
let pages = [], docs = [], selected = new Set(), lastIdx = null;

document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('dropOverlay').classList.add('active'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) document.getElementById('dropOverlay').classList.remove('active'); });
document.addEventListener('drop', e => { e.preventDefault(); document.getElementById('dropOverlay').classList.remove('active'); handleFileInput(e.dataTransfer.files); });

async function handleFileInput(files) {
  const arr = Array.from(files).filter(f => /\.(jpg|jpeg|png|tif|tiff|pdf)$/i.test(f.name));
  if (!arr.length) { showToast('Nenhum arquivo válido', 'err'); return; }
  arr.sort((a, b) => {
    const na = a.name.replace(/(\d+)/g, n => n.padStart(10,'0')).toLowerCase();
    const nb = b.name.replace(/(\d+)/g, n => n.padStart(10,'0')).toLowerCase();
    return na < nb ? -1 : na > nb ? 1 : 0;
  });
  for (const file of arr) {
    const dataUrl = await toDataURL(file);
    pages.push({ id: uid(), file, name: file.name, dataUrl, type: file.type === 'application/pdf' ? 'pdf' : 'img', grouped: false });
  }
  renderPages(); updateStats();
  showToast('✅ ' + arr.length + ' arquivo(s) importado(s)', 'ok');
}

function toDataURL(file) { return new Promise((r,e) => { const fr = new FileReader(); fr.onload = x => r(x.target.result); fr.onerror = e; fr.readAsDataURL(file); }); }
function toArrayBuffer(file) { return new Promise((r,e) => { const fr = new FileReader(); fr.onload = x => r(x.target.result); fr.onerror = e; fr.readAsArrayBuffer(file); }); }
function uid() { return Date.now() + '_' + Math.random().toString(36).slice(2); }
function pdfIcon() { return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100"><rect width="80" height="100" fill="#1a1a24"/><text x="40" y="58" text-anchor="middle" font-size="26" fill="#5b8dee" font-family="monospace">PDF</text></svg>'); }

function renderPages() {
  const grid = document.getElementById('pagesGrid');
  document.getElementById('pageCount').textContent = pages.length;
  if (!pages.length) { grid.innerHTML = '<div class="empty-msg" style="grid-column:1/-1"><div class="ei">🖼️</div><p>Arraste as imagens JPG<br>ou PDFs do protocolo aqui</p></div>'; return; }
  grid.innerHTML = '';
  pages.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'page-card' + (selected.has(p.id) ? ' selected' : '') + (p.grouped ? ' grouped' : '');
    const img = document.createElement('img'); img.src = p.type === 'pdf' ? pdfIcon() : p.dataUrl;
    const num = document.createElement('div'); num.className = 'page-num'; num.textContent = String(i+1).padStart(2,'0');
    const chk = document.createElement('div'); chk.className = 'page-check'; chk.textContent = '✓';
    const fnm = document.createElement('div'); fnm.className = 'page-fname'; fnm.textContent = p.name;
    card.append(img, num, chk, fnm);
    if (!p.grouped) card.addEventListener('click', e => toggleSel(p.id, e.shiftKey, i));
    grid.appendChild(card);
  });
  updateSelBadge();
}

function toggleSel(id, shift, idx) {
  if (shift && lastIdx !== null) { const a = Math.min(lastIdx,idx), b = Math.max(lastIdx,idx); for (let i=a;i<=b;i++) if (!pages[i].grouped) selected.add(pages[i].id); }
  else { if (selected.has(id)) selected.delete(id); else selected.add(id); lastIdx = idx; }
  renderPages(); updateGroupBtn();
}
function selectAll() { pages.forEach(p => { if (!p.grouped) selected.add(p.id); }); renderPages(); updateGroupBtn(); }
function clearSel() { selected.clear(); renderPages(); updateGroupBtn(); }
function updateGroupBtn() {
  const btn = document.getElementById('groupBtn');
  btn.disabled = selected.size === 0;
  btn.textContent = selected.size > 0 ? '⊕ Agrupar ' + selected.size + ' pág.' : '⊕ Agrupar selecionadas';
  updateSelBadge();
}
function updateSelBadge() { const b = document.getElementById('selBadge'); if (selected.size > 0) { b.style.display='inline'; b.textContent=selected.size+' selecionadas'; } else b.style.display='none'; }

function groupSelected() {
  if (!selected.size) return;
  const ids = [...selected];
  const names = pages.filter(p => ids.includes(p.id)).map(p => p.name.toLowerCase()).join(' ');
  docs.push({ id: uid(), pageIds: ids, category: detectCat(names), name: '', hasValidity: false, validDate: '' });
  pages.forEach(p => { if (ids.includes(p.id)) p.grouped = true; });
  selected.clear(); renderPages(); renderDocs(); updateStats(); updateGroupBtn();
}

function detectCat(s) {
  if (s.includes('cndt')||s.includes('trabalhist')) return 'CERTIDAO';
  if (s.includes('sefaz')||s.includes('certid')) return 'CERTIDAO';
  if (s.includes('ato_lavrado')||s.includes('livro')) return 'ATO_LAVRADO';
  if (s.includes('contrato')||s.includes('financiamento')) return 'CONTRATO';
  if (s.includes('declaracao')) return 'DECLARACAO';
  if (s.includes('escritura')) return 'ESCRITURA';
  if (s.includes('matricula')) return 'MATRICULA';
  if (s.includes('memorial')) return 'MEMORIAL';
  if (s.includes('planta')||s.includes('mapa')) return 'PLANTA_ENGENHARIA';
  if (s.includes('procuracao')) return 'PROCURACAO';
  if (s.includes('projeto')) return 'PROJETO';
  return 'OUTROS';
}

function renderDocs() {
  const list = document.getElementById('docsList');
  document.getElementById('docCount').textContent = docs.length;
  document.getElementById('dlBtn').disabled = docs.length === 0;
  if (!docs.length) { list.innerHTML = '<div class="empty-msg"><div class="ei">📁</div><p>Selecione páginas à esquerda<br>e clique em <strong>Agrupar</strong></p></div>'; return; }
  list.innerHTML = '';
  docs.forEach((doc, i) => {
    const num = String(i+1).padStart(2,'0');
    const docPages = pages.filter(p => doc.pageIds.includes(p.id));
    const card = document.createElement('div'); card.className = 'doc-card';

    const top = document.createElement('div'); top.className = 'doc-card-top';
    const badge = document.createElement('div'); badge.className = 'doc-num-badge'; badge.textContent = num;
    const titleEl = document.createElement('div'); titleEl.className = 'doc-title'; titleEl.textContent = doc.name || '—';
    const pgc = document.createElement('span'); pgc.style.cssText = 'font-size:11px;color:var(--muted);font-family:var(--mono)'; pgc.textContent = docPages.length + ' pág.';
    const rmBtn = document.createElement('button'); rmBtn.className = 'btn btn-danger btn-xs'; rmBtn.textContent = '✕'; rmBtn.style.marginLeft = '8px'; rmBtn.onclick = () => removeDoc(i);
    top.append(badge, titleEl, pgc, rmBtn);

    const fields = document.createElement('div'); fields.className = 'doc-fields';

    const f1 = document.createElement('div'); f1.className = 'doc-field';
    const l1 = document.createElement('div'); l1.className = 'flabel'; l1.textContent = 'Categoria / Tipo';
    const sel = document.createElement('select');
    CATS.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; if (c === doc.category) o.selected = true; sel.appendChild(o); });
    sel.onchange = function() { docs[i].category = this.value; };
    f1.append(l1, sel);

    const f2 = document.createElement('div'); f2.className = 'doc-field';
    const l2 = document.createElement('div'); l2.className = 'flabel'; l2.textContent = 'Descrição GED';
    const dlId = 'hist_' + i;
    const inp = document.createElement('input'); inp.type = 'text'; inp.value = doc.name; inp.placeholder = 'Ex: CNDT - João da Silva'; inp.setAttribute('list', dlId); inp.autocomplete = 'off';
    const dl = document.createElement('datalist'); dl.id = dlId;
    getHistory().forEach(h => { const o = document.createElement('option'); o.value = h; dl.appendChild(o); });
    inp.oninput = function() { docs[i].name = this.value; saveHistory(this.value); titleEl.textContent = this.value || '—'; };
    f2.append(l2, inp, dl);

    const f3 = document.createElement('div'); f3.className = 'doc-field';
    const l3 = document.createElement('div'); l3.className = 'flabel'; l3.textContent = 'Validade';
    const vrow = document.createElement('div'); vrow.className = 'valid-row';
    const vchk = document.createElement('input'); vchk.type = 'checkbox'; vchk.id = 'vc'+i; vchk.checked = doc.hasValidity;
    const vlbl = document.createElement('label'); vlbl.htmlFor = 'vc'+i; vlbl.textContent = 'Tem validade';
    vrow.append(vchk, vlbl);
    const vdate = document.createElement('input'); vdate.type = 'date'; vdate.value = doc.validDate || ''; vdate.style.cssText = 'margin-top:4px;display:'+(doc.hasValidity?'block':'none');
    vchk.onchange = function() { docs[i].hasValidity = this.checked; vdate.style.display = this.checked ? 'block' : 'none'; };
    vdate.oninput = function() { docs[i].validDate = this.value; };
    f3.append(l3, vrow, vdate);
    fields.append(f1, f2, f3);

    const strip = document.createElement('div'); strip.className = 'doc-pages-strip';
    docPages.forEach((p, pi) => {
      const th = document.createElement('div'); th.className = 'strip-thumb'; th.title = 'Clique para remover';
      const ti = document.createElement('img'); ti.src = p.type === 'pdf' ? pdfIcon() : p.dataUrl;
      th.appendChild(ti); th.onclick = () => removePageFromDoc(i, pi); strip.appendChild(th);
    });
    const sc = document.createElement('span'); sc.className = 'strip-count'; sc.textContent = docPages.length + ' pág.'; strip.appendChild(sc);

    card.append(top, fields, strip);
    list.appendChild(card);
  });
}

function removeDoc(i) { docs[i].pageIds.forEach(id => { const p = pages.find(x => x.id===id); if (p) p.grouped=false; }); docs.splice(i,1); renderDocs(); renderPages(); updateStats(); }
function removePageFromDoc(di, pi) { const pid = docs[di].pageIds[pi]; docs[di].pageIds.splice(pi,1); const p = pages.find(x=>x.id===pid); if (p) p.grouped=false; if (!docs[di].pageIds.length) docs.splice(di,1); renderDocs(); renderPages(); updateStats(); }
function clearAll() { if (!confirm('Limpar tudo? Isso apaga todos os documentos.')) return; pages=[]; docs=[]; selected.clear(); renderPages(); renderDocs(); updateStats(); }
function updateStats() { document.getElementById('sPgs').textContent=pages.length; document.getElementById('sDocs').textContent=docs.length; document.getElementById('sGrp').textContent=pages.filter(p=>p.grouped).length; }


async function imagesToPdf(docPages) {
  const W = 595.28, H = 841.89;
  const enc = new TextEncoder();
  const parts = [];
  let pos = 0;
  const offsets = [];
  let nextId = 1;
  const catalogId = nextId++;
  const pagesId = nextId++;
  const pageData = [];

  for (const page of docPages) {
    if (page.type !== 'img') continue;
    const result = await imgToJpeg(page.dataUrl);
    const jpegBytes = b64ToBytes(result.b64);
    const scale = Math.min(W / result.w, H / result.h);
    const dw = (result.w * scale).toFixed(2);
    const dh = (result.h * scale).toFixed(2);
    const dx = ((W - result.w * scale) / 2).toFixed(2);
    const dy = ((H - result.h * scale) / 2).toFixed(2);
    pageData.push({ imgId: nextId++, contentId: nextId++, pageId: nextId++, jpegBytes, w: result.w, h: result.h, dw, dh, dx, dy });
  }

  if (!pageData.length) return new ArrayBuffer(0);

  function push(str) { const b = enc.encode(str); parts.push(b); pos += b.length; }
  function pushB(bytes) { parts.push(bytes); pos += bytes.length; }

  push('%PDF-1.4\n');
  offsets[catalogId] = pos;
  push(catalogId + ' 0 obj\n<</Type /Catalog /Pages ' + pagesId + ' 0 R>>\nendobj\n');
  const kids = pageData.map(p => p.pageId + ' 0 R').join(' ');
  offsets[pagesId] = pos;
  push(pagesId + ' 0 obj\n<</Type /Pages /Kids [' + kids + '] /Count ' + pageData.length + '>>\nendobj\n');

  for (const p of pageData) {
    offsets[p.imgId] = pos;
    push(p.imgId + ' 0 obj\n<</Type /XObject /Subtype /Image /Width ' + p.w + ' /Height ' + p.h + ' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ' + p.jpegBytes.length + '>>\nstream\n');
    pushB(p.jpegBytes);
    push('\nendstream\nendobj\n');
    const cs = 'q ' + p.dw + ' 0 0 ' + p.dh + ' ' + p.dx + ' ' + p.dy + ' cm /Im' + p.imgId + ' Do Q';
    offsets[p.contentId] = pos;
    push(p.contentId + ' 0 obj\n<</Length ' + cs.length + '>>\nstream\n' + cs + '\nendstream\nendobj\n');
    offsets[p.pageId] = pos;
    push(p.pageId + ' 0 obj\n<</Type /Page /MediaBox [0 0 ' + W + ' ' + H + '] /Contents ' + p.contentId + ' 0 R /Resources <</XObject <</Im' + p.imgId + ' ' + p.imgId + ' 0 R>>>> /Parent ' + pagesId + ' 0 R>>\nendobj\n');
  }

  const xrefPos = pos;
  let xref = 'xref\n0 ' + nextId + '\n0000000000 65535 f \n';
  for (let i = 1; i < nextId; i++) xref += (offsets[i]||0).toString().padStart(10,'0') + ' 00000 n \n';
  push(xref);
  push('trailer\n<</Size ' + nextId + ' /Root ' + catalogId + ' 0 R>>\nstartxref\n' + xrefPos + '\n%%EOF\n');

  const total = parts.reduce((s, b) => s + b.length, 0);
  const result2 = new Uint8Array(total);
  let off = 0;
  for (const b of parts) { result2.set(b, off); off += b.length; }
  return result2.buffer;
}

function imgToJpeg(dataUrl) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
      canvas.getContext('2d').drawImage(img, 0, 0);
      const b64 = canvas.toDataURL('image/jpeg', 0.88).split(',')[1];
      res({ b64, w: img.naturalWidth, h: img.naturalHeight });
    };
    img.src = dataUrl;
  });
}

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}


async function downloadZip() {
  if (!docs.length) return;
  // Set default name if empty
  docs.forEach((d, i) => { if (!d.name.trim()) d.name = d.category + '_' + String(i+1).padStart(2,'0'); });
  setProgress(true, 'Montando ZIP...', 5);
  try {
    const files = [];
    let csv = 'Ordem,Categoria,Tipo,Descricao,Validade,Data Validade,Paginas\n';
    for (let i = 0; i < docs.length; i++) {
      const doc = docs[i];
      const num = String(i+1).padStart(2,'0');
      const base = num + ' - ' + doc.category + ' - ' + sanitize(doc.name);
      const docPages = pages.filter(p => doc.pageIds.includes(p.id));
      setProgress(true, 'Preparando: ' + doc.name, 10 + Math.round(i/docs.length*80));
      if (docPages.length === 1) {
        const pg = docPages[0];
        const ext = pg.name.split('.').pop().toLowerCase();
        files.push({ name: base + '.' + ext, data: await toArrayBuffer(pg.file) });
      } else {
        for (let j = 0; j < docPages.length; j++) {
          const pg = docPages[j];
          const ext = pg.name.split('.').pop().toLowerCase();
          files.push({ name: base + '/' + String(j+1).padStart(2,'0') + '_' + sanitize(pg.name) + '.' + ext, data: await toArrayBuffer(pg.file) });
        }
      }
      csv += num + ',"' + doc.category + '","' + doc.category + '","' + doc.name + '","' + (doc.hasValidity?'Sim':'Não') + '","' + (doc.validDate||'') + '","' + docPages.length + '"\n';
    }
    const enc = new TextEncoder();
    files.push({ name: '_LISTA_GED.csv', data: enc.encode(csv).buffer });
    setProgress(true, 'Gerando ZIP...', 92);
    const zipBytes = await MiniZip.create(files);
    setProgress(true, 'Baixando...', 99);
    MiniZip.download(zipBytes, 'GED_' + new Date().toISOString().slice(0,10) + '.zip');
    setProgress(false);
    showToast('✅ ZIP com ' + docs.length + ' documento(s) baixado!', 'ok');
  } catch(err) { console.error(err); setProgress(false); showToast('Erro: ' + err.message, 'err'); }
}

function getHistory() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); } catch { return []; } }
function saveHistory(val) { if (!val||val.length<3) return; const l=getHistory().filter(x=>x!==val); l.unshift(val); localStorage.setItem(STORAGE_KEY,JSON.stringify(l.slice(0,80))); }
function setProgress(show,msg,pct) { document.getElementById('progressOverlay').classList.toggle('on',show); if(show){document.getElementById('pmsg').textContent=msg;document.getElementById('pfill').style.width=pct+'%';} }
function showToast(msg,type) { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+(type||'ok')+' show'; setTimeout(()=>t.classList.remove('show'),3500); }
function sanitize(s) { return String(s||'').replace(/[/\\:*?<>|]/g,'_').trim(); }
</script>
